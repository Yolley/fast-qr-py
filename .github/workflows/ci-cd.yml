name: CI/CD
on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.13
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dependencies
        run: make deps
      - name: Execute linters
        run: make lint

  test:
    needs:
      - lint
    strategy:
      matrix:
        python: [ "3.13", "3.14" ]
      fail-fast: false

    name: "Test on Python ${{ matrix.python }}"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}
      - name: Install testing requirements
        run: make deps
      - name: Execute tests
        run: make test

  test-summary:
    name: Test matrix status
    runs-on: ubuntu-latest
    needs: [ test ]
    if: always()
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}

  build-wheels:
    name: Build wheel for ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    needs: [ test-summary ]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux x86_64
            runner: ubuntu-latest
            target: x86_64
            manylinux: auto
            artifact: dist-linux-x86_64
          - name: Linux aarch64
            runner: ubuntu-24.04-arm
            target: aarch64
            manylinux: auto
            artifact: dist-linux-aarch64
          - name: macOS arm64
            runner: macos-latest
            target: aarch64
            manylinux: off
            artifact: dist-macos-aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.13
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          args: --release --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform.artifact }}
          path: dist/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    needs: [ test-summary ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  update-changelog:
    name: Update CHANGELOG.md
    runs-on: ubuntu-latest
    needs: [ build-wheels, build-sdist ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: pyproject.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit
        run: |
          git checkout ${{ github.ref_name }}
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          set +e
          git add CHANGELOG.md
          git commit -m "chore(changelog): Update changelog"
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git ${{ github.ref_name }}

  publish:
    name: Build and publish Python 🐍 distributions 📦 to PyPI
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [ build-wheels, build-sdist ]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      # The URL is used in the 'successfully deployed' message as the link
      # for the 'View deployment' button.
      url: https://pypi.org/p/fast-qr-py
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: 'true'

  release:
    name: Create Github Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [ publish ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: pyproject.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Upload the binary releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          body: ${{ steps.git-cliff.outputs.content }}
